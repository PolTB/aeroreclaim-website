name: Merge Airport Data
on:
  push:
    paths:
      - 'data/airports_part_a.json'
      - 'data/airports_part_b.json'
      - 'data/airports_part_c.json'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Merge airport data
        run: python3 scripts/merge_airports.py
      - name: Commit merged file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/airport_db_compact.json
          git diff --staged --quiet || git commit -m "Add airport database for Legal Scoring Agent"
          git push
