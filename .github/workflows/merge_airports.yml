name: Merge Airport Data
on:
  push:
    paths:
      - 'data/airports_part1.json'
      - 'data/airports_part2.json'
  workflow_dispatch:

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Merge airport data
        run: |
          python3 -c "
import json
with open('data/airports_part1.json') as f:
    p1 = json.load(f)
with open('data/airports_part2.json') as f:
    p2 = json.load(f)
merged = {**p1, **p2}
with open('data/airport_db_compact.json', 'w') as f:
    json.dump(merged, f, separators=(',', ':'), ensure_ascii=True)
print(f'Merged {len(merged)} airports')
"
      - name: Commit merged file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/airport_db_compact.json
          git diff --staged --quiet || git commit -m "Add airport database for Legal Scoring Agent"
          git push
